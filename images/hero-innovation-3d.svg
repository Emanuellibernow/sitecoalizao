<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGlow" x1="900" y1="520" x2="260" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DFF8F3" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#DFF8F3" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="ribbonA" x1="180" y1="760" x2="1440" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1AA99A" stop-opacity="0.00"/>
      <stop offset="0.15" stop-color="#36B9A8" stop-opacity="0.45"/>
      <stop offset="0.45" stop-color="#168E80" stop-opacity="0.82"/>
      <stop offset="0.78" stop-color="#34B39B" stop-opacity="0.58"/>
      <stop offset="1" stop-color="#98D96B" stop-opacity="0.22"/>
    </linearGradient>

    <linearGradient id="ribbonB" x1="120" y1="690" x2="1510" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7EDFD3" stop-opacity="0.00"/>
      <stop offset="0.18" stop-color="#65D4C8" stop-opacity="0.32"/>
      <stop offset="0.52" stop-color="#39B6A8" stop-opacity="0.62"/>
      <stop offset="0.82" stop-color="#7ACB68" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#D4E67B" stop-opacity="0.12"/>
    </linearGradient>

    <linearGradient id="ribbonC" x1="350" y1="760" x2="1530" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DFFFFA" stop-opacity="0.00"/>
      <stop offset="0.18" stop-color="#B6F0E6" stop-opacity="0.24"/>
      <stop offset="0.46" stop-color="#7DDBCD" stop-opacity="0.48"/>
      <stop offset="0.7" stop-color="#5CBD9E" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#F1E98A" stop-opacity="0.18"/>
    </linearGradient>

    <linearGradient id="wire" x1="420" y1="610" x2="1520" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7BE1D5" stop-opacity="0.02"/>
      <stop offset="0.4" stop-color="#74E3D8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#F1F8B8" stop-opacity="0.7"/>
    </linearGradient>

    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0.5 0.5) scale(1)">
      <stop offset="0" stop-color="white"/>
      <stop offset="0.25" stop-color="#F6FFF8"/>
      <stop offset="0.65" stop-color="#B9FFF0" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#7EE4D6" stop-opacity="0"/>
    </radialGradient>

    <filter id="blurHuge" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="38"/>
    </filter>

    <filter id="blurSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <filter id="shadowRibbon" x="-30%" y="-30%" width="200%" height="200%">
      <feDropShadow dx="0" dy="26" stdDeviation="22" flood-color="#157B70" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#E8FFF9" flood-opacity="0.22"/>
    </filter>

    <filter id="shadowRibbon2" x="-30%" y="-30%" width="200%" height="200%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#106E67" flood-opacity="0.12"/>
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#F3FFF8" flood-opacity="0.16"/>
    </filter>

    <filter id="nodeGlow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="nodeGlowBig" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- subtle depth glow -->
  <ellipse cx="720" cy="760" rx="310" ry="70" fill="url(#bgGlow)" filter="url(#blurHuge)"/>

  <!-- far ribbons -->
  <path d="M-80 690 C120 600 280 580 480 620 C700 665 870 670 1030 590 C1210 500 1370 340 1630 210"
        stroke="url(#ribbonC)" stroke-width="44" stroke-linecap="round" fill="none" opacity="0.38" filter="url(#shadowRibbon2)"/>
  <path d="M-40 610 C180 650 330 665 520 630 C760 585 910 500 1080 485 C1290 467 1410 370 1640 220"
        stroke="url(#ribbonC)" stroke-width="26" stroke-linecap="round" fill="none" opacity="0.3" filter="url(#shadowRibbon2)"/>

  <!-- main 3d ribbons -->
  <path d="M-50 780 C180 640 360 560 560 560 C760 560 900 670 1080 640 C1260 610 1410 430 1640 265"
        stroke="url(#ribbonA)" stroke-width="64" stroke-linecap="round" fill="none" filter="url(#shadowRibbon)"/>
  <path d="M-10 735 C220 610 390 570 600 590 C790 608 930 705 1110 682 C1280 660 1430 500 1640 320"
        stroke="url(#ribbonB)" stroke-width="34" stroke-linecap="round" fill="none" opacity="0.78" filter="url(#shadowRibbon2)"/>
  <path d="M120 655 C300 610 450 640 640 605 C840 568 960 445 1130 420 C1320 392 1460 280 1640 160"
        stroke="url(#ribbonA)" stroke-width="28" stroke-linecap="round" fill="none" opacity="0.92" filter="url(#shadowRibbon2)"/>
  <path d="M190 610 C390 595 530 680 730 690 C935 700 1070 585 1230 515 C1385 447 1490 340 1640 230"
        stroke="url(#ribbonB)" stroke-width="22" stroke-linecap="round" fill="none" opacity="0.95"/>
  <path d="M300 590 C480 620 650 640 840 600 C1020 560 1140 430 1300 375 C1430 330 1530 250 1640 170"
        stroke="url(#ribbonC)" stroke-width="18" stroke-linecap="round" fill="none" opacity="0.95"/>

  <!-- near ribbon that feels like it comes out of screen -->
  <path d="M-130 835 C40 725 150 645 280 620 C410 594 560 635 700 650 C870 668 1010 640 1140 565 C1290 478 1445 348 1645 205"
        stroke="url(#ribbonA)" stroke-width="92" stroke-linecap="round" fill="none" opacity="0.68" filter="url(#shadowRibbon)"/>
  <path d="M-90 828 C60 735 170 670 305 650 C450 628 585 660 730 673 C895 688 1035 651 1160 582 C1320 494 1470 360 1650 230"
        stroke="#DFFFF9" stroke-opacity="0.18" stroke-width="8" stroke-linecap="round" fill="none" filter="url(#blurSoft)"/>

  <!-- light wire network -->
  <path d="M560 560 L760 500 L975 510 L1155 435 L1355 360 L1515 250" stroke="url(#wire)" stroke-width="2.1" fill="none"/>
  <path d="M575 640 L780 585 L960 635 L1128 590 L1310 502 L1470 388" stroke="url(#wire)" stroke-width="1.6" fill="none" opacity="0.7"/>
  <path d="M760 500 L860 640 L975 510 L1128 590 L1155 435 L1310 502" stroke="url(#wire)" stroke-width="1.6" fill="none" opacity="0.68"/>
  <path d="M860 640 L1002 600 L1128 590 L1280 498 L1410 420" stroke="url(#wire)" stroke-width="1.1" fill="none" opacity="0.5"/>
  <path d="M975 510 L1090 470 L1235 420 L1380 332 L1530 248" stroke="url(#wire)" stroke-width="1.3" fill="none" opacity="0.62"/>
  <path d="M1155 435 L1235 420 L1355 360 L1515 250" stroke="url(#wire)" stroke-width="1.1" fill="none" opacity="0.5"/>
  <path d="M780 585 L920 540 L1090 470 L1280 498" stroke="url(#wire)" stroke-width="1.1" fill="none" opacity="0.42"/>

  <!-- highlights -->
  <path d="M210 675 C420 610 585 628 755 600 C970 565 1085 440 1270 395 C1420 358 1520 275 1610 205"
        stroke="#F8FFE7" stroke-opacity="0.42" stroke-width="4" stroke-linecap="round" fill="none" filter="url(#blurSoft)"/>
  <path d="M40 755 C220 645 390 604 590 610 C810 615 945 690 1125 662 C1300 634 1450 475 1630 325"
        stroke="#D9FFF7" stroke-opacity="0.18" stroke-width="4" stroke-linecap="round" fill="none" filter="url(#blurSoft)"/>

  <!-- nodes -->
  <g filter="url(#nodeGlowBig)">
    <circle cx="560" cy="560" r="12" fill="url(#orb)"/>
    <circle cx="1060" cy="470" r="11" fill="url(#orb)"/>
    <circle cx="1235" cy="420" r="12" fill="url(#orb)"/>
    <circle cx="1380" cy="332" r="13" fill="url(#orb)"/>
  </g>
  <g filter="url(#nodeGlow)">
    <circle cx="220" cy="705" r="9" fill="url(#orb)"/>
    <circle cx="360" cy="650" r="7" fill="url(#orb)"/>
    <circle cx="475" cy="612" r="8" fill="url(#orb)"/>
    <circle cx="760" cy="500" r="8" fill="url(#orb)"/>
    <circle cx="780" cy="585" r="8" fill="url(#orb)"/>
    <circle cx="860" cy="640" r="9" fill="url(#orb)"/>
    <circle cx="920" cy="540" r="7" fill="url(#orb)"/>
    <circle cx="975" cy="510" r="6" fill="url(#orb)"/>
    <circle cx="1002" cy="600" r="7" fill="url(#orb)"/>
    <circle cx="1128" cy="590" r="8" fill="url(#orb)"/>
    <circle cx="1155" cy="435" r="6" fill="url(#orb)"/>
    <circle cx="1280" cy="498" r="7" fill="url(#orb)"/>
    <circle cx="1310" cy="502" r="5" fill="url(#orb)"/>
    <circle cx="1355" cy="360" r="7" fill="url(#orb)"/>
    <circle cx="1410" cy="420" r="5" fill="url(#orb)"/>
    <circle cx="1470" cy="388" r="7" fill="url(#orb)"/>
    <circle cx="1515" cy="250" r="6" fill="url(#orb)"/>
    <circle cx="1530" cy="248" r="5" fill="url(#orb)"/>
  </g>

  <!-- tiny sparkle depth -->
  <g opacity="0.55">
    <circle cx="118" cy="785" r="2.2" fill="#DFFFFA"/>
    <circle cx="275" cy="742" r="2.4" fill="#DFFFFA"/>
    <circle cx="612" cy="580" r="2.3" fill="#DFFFFA"/>
    <circle cx="818" cy="548" r="2.3" fill="#DFFFFA"/>
    <circle cx="1040" cy="540" r="2.1" fill="#EFFFF9"/>
    <circle cx="1268" cy="454" r="2.2" fill="#F8FFE4"/>
    <circle cx="1456" cy="290" r="2.3" fill="#F8FFE4"/>
  </g>
</svg>